<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Rebecca 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  overflow: hidden;
  text-align: center;
  color: white;
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity:1;}
  100% {transform: translateY(-10vh); opacity:0;}
}

.card {
  position: relative;
  top: 20vh;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  margin: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
  animation: fadeIn 1.5s;
}

@keyframes fadeIn {
  from {opacity:0; transform:scale(0.8);}
  to {opacity:1; transform:scale(1);}
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #00ff88;
  color: black;
}

.no {
  background: #ff0044;
  color: white;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

#finale {
  display: none;
  margin-top: 30vh;
  animation: fadeIn 2s;
}

h1 {
  text-shadow: 0 0 15px rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<div class="card" id="main">
  <h1>💘 Rebecca 💘</h1>
  <p>Vuoi uscire con me? 😏</p>

  <button class="yes" onclick="accetta()">SI ❤️</button>
  <button class="no" id="noBtn">NO 💀</button>
</div>

<div id="finale">
  <h1>🎉 LO SAPEVO 😍</h1>
  <p>Hai appena accettato un appuntamento con me 💘</p>
  <p>Preparati... sarà indimenticabile 😏🔥</p>
</div>

<script>
function creaCuore() {
  let cuore = document.createElement("div");
  cuore.className = "heart";
  cuore.innerText = "💘";
  cuore.style.left = Math.random() * 100 + "vw";
  cuore.style.fontSize = (10 + Math.random()*30) + "px";
  document.body.appendChild(cuore);
  setTimeout(() => cuore.remove(), 6000);
}

setInterval(creaCuore, 300);

let noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.top = Math.random() * 80 + "vh";
  noBtn.style.left = Math.random() * 80 + "vw";
});

function accetta() {
  document.getElementById("main").style.display = "none";
  document.getElementById("finale").style.display = "block";
}
</script>

</body>
</html>
